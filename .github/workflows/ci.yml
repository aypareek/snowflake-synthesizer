name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # Install only the lightweight deps needed for unit tests.
      # Snowflake packages are heavy and not needed for pure-Python tests.
      - name: Install test dependencies
        run: |
          pip install \
            pydantic>=2.0.0 \
            pyyaml>=6.0 \
            networkx>=3.0 \
            faker>=18.0.0 \
            "typer[all]>=0.9.0" \
            rich>=13.0.0 \
            pytest>=7.0.0 \
            pytest-cov>=4.0.0

      # PYTHONPATH=src lets pytest find the package without a full editable install,
      # which avoids needing snowflake-snowpark-python at test time.
      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest tests/unit/ -v --tb=short
