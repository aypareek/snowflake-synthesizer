name: Publish to PyPI

# Triggers when you push a version tag like v0.1.0, v0.2.0, etc.
on:
  push:
    tags:
      - "v*"

jobs:
  # ─────────────────────────────────────────
  # Job 1: run unit tests before publishing
  # ─────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install test dependencies
        run: |
          pip install \
            pydantic>=2.0.0 pyyaml>=6.0 networkx>=3.0 faker>=18.0.0 \
            "typer[all]>=0.9.0" rich>=13.0.0 pytest>=7.0.0

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest tests/unit/ -v --tb=short

  # ─────────────────────────────────────────
  # Job 2: build and publish (only if tests pass)
  # ─────────────────────────────────────────
  publish:
    name: Build and publish
    needs: test
    runs-on: ubuntu-latest

    # Required for PyPI Trusted Publishing (no stored secrets needed)
    environment: pypi
    permissions:
      id-token: write   # allows OIDC token exchange with PyPI
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password needed — uses Trusted Publishing (OIDC)
